const NS = 'http://www.w3.org/2000/svg';

function estimateWidth(text, size) {
  let w = 0;
  for (const ch of text) w += ch.charCodeAt(0) > 127 ? size : Math.round(size * 0.6);
  return w + 12;
}

// ── makeEdge ──────────────────────────
function makeEdge({ id, src, tgt, d, stroke, sw, dash, marker }) {
  const g = document.createElementNS(NS, 'g');
  g.classList.add('edge-g');
  g.dataset.eid = String(id);
  if (src) g.dataset.src = src;
  if (tgt) g.dataset.tgt = tgt;

  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', stroke);
  path.setAttribute('stroke-width', sw);
  if (dash)   path.setAttribute('stroke-dasharray', dash);
  if (marker) path.setAttribute('marker-end', `url(#a-${marker})`);

  g.appendChild(path);
  return g;
}

// ── makeLabel ─────────────────────────
function makeLabel({ id, cx, cy, text, color, size = 12, bold = false, w }) {
  const width  = w ?? estimateWidth(text, size);
  const g = document.createElementNS(NS, 'g');
  g.classList.add('label-g');
  g.dataset.leid = String(id);

  const rect = document.createElementNS(NS, 'rect');
  rect.setAttribute('x', cx - width / 2);
  rect.setAttribute('y', cy - 14);
  rect.setAttribute('width', width);
  rect.setAttribute('height', 20);
  rect.setAttribute('rx', 4);
  rect.setAttribute('fill', 'white');

  const t = document.createElementNS(NS, 'text');
  t.setAttribute('x', cx);
  t.setAttribute('y', cy);
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('font-size', size);
  t.setAttribute('fill', color);
  if (bold) t.setAttribute('font-weight', '600');
  t.textContent = text;

  g.appendChild(rect);
  g.appendChild(t);
  return g;
}

// ── makeNode ──────────────────────────
function makeNode(cfg) {
  const {
    id, shape, cx, cy, fill, stroke, sw = 2,
    name, nameSize = 14, nameWeight = 700, nameFill = 'white',
    sub, subFill = '#888', tooltip,
  } = cfg;

  const g = document.createElementNS(NS, 'g');
  g.setAttribute('class', 'node');
  g.dataset.nid = id;

  if (tooltip) {
    const t = document.createElementNS(NS, 'title');
    t.textContent = tooltip;
    g.appendChild(t);
  }

  let nameY, subY;
  if (shape === 'ellipse') {
    const { rx, ry } = cfg;
    const el = document.createElementNS(NS, 'ellipse');
    el.setAttribute('cx', cx); el.setAttribute('cy', cy);
    el.setAttribute('rx', rx); el.setAttribute('ry', ry);
    el.setAttribute('fill', fill); el.setAttribute('stroke', stroke);
    el.setAttribute('stroke-width', sw);
    g.appendChild(el);
    nameY = sub ? cy - Math.round(ry * 0.14) : cy + 5;
    subY  = cy + Math.round(ry * 0.39);
  } else {
    const { w, h } = cfg;
    const rect = document.createElementNS(NS, 'rect');
    rect.setAttribute('x', cx - w / 2); rect.setAttribute('y', cy - h / 2);
    rect.setAttribute('width', w);      rect.setAttribute('height', h);
    rect.setAttribute('rx', 8);
    rect.setAttribute('fill', fill); rect.setAttribute('stroke', stroke);
    rect.setAttribute('stroke-width', sw);
    g.appendChild(rect);
    nameY = sub ? cy - Math.round(h * 0.065) : cy + 5;
    subY  = nameY + 17;
  }

  const nt = document.createElementNS(NS, 'text');
  nt.setAttribute('x', cx); nt.setAttribute('y', nameY);
  nt.setAttribute('text-anchor', 'middle');
  nt.setAttribute('font-size', nameSize);
  nt.setAttribute('fill', nameFill);
  nt.setAttribute('font-weight', nameWeight);
  nt.textContent = name;
  g.appendChild(nt);

  if (sub) {
    const st = document.createElementNS(NS, 'text');
    st.setAttribute('x', cx); st.setAttribute('y', subY);
    st.setAttribute('text-anchor', 'middle');
    st.setAttribute('font-size', nameSize >= 15 ? 11 : 10);
    st.setAttribute('fill', subFill);
    st.textContent = sub;
    g.appendChild(st);
  }

  return g;
}

// ── Highlight logic ───────────────────
let activeNode = null;

function applyHighlight(nid) {
  // Build set of connected edge ids and neighbor node ids
  const litEdges = new Set();
  const litNodes = new Set([nid]);

  EDGES.forEach(e => {
    if (e.src === nid || e.tgt === nid) {
      litEdges.add(String(e.id));
      if (e.src) litNodes.add(e.src);
      if (e.tgt) litNodes.add(e.tgt);
    }
  });

  // Nodes
  document.querySelectorAll('[data-nid]').forEach(el => {
    const id = el.dataset.nid;
    el.classList.toggle('dim', !litNodes.has(id));
    el.classList.toggle('sel', id === nid);
  });

  // Edges
  document.querySelectorAll('[data-eid]').forEach(el => {
    el.classList.toggle('dim', !litEdges.has(el.dataset.eid));
  });

  // Labels
  document.querySelectorAll('[data-leid]').forEach(el => {
    el.classList.toggle('dim', !litEdges.has(el.dataset.leid));
  });
}

function resetHighlight() {
  activeNode = null;
  document.querySelectorAll('.dim, .sel').forEach(el => {
    el.classList.remove('dim', 'sel');
  });
}

// Node click
document.getElementById('nodes').addEventListener('click', e => {
  const nodeEl = e.target.closest('[data-nid]');
  if (!nodeEl) return;
  const nid = nodeEl.dataset.nid;
  if (nid === activeNode) {
    resetHighlight();
  } else {
    activeNode = nid;
    applyHighlight(nid);
  }
  e.stopPropagation();
});

// Background click to reset
document.getElementById('graph').addEventListener('click', resetHighlight);
</script>
</body>
</html>
