<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LABEL CONFIG  ← 只需要調這裡
//
//  cx, cy : 標籤中心座標
//  text   : 標籤文字
//  color  : 文字顏色
//  size   : 字體大小（預設 12）
//  bold   : 是否粗體（預設 false）
//  w      : 強制寬度（不填則自動估算）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LABELS = [
  { id:  1, cx: 338, cy: 290, text: '行賄 210 萬',   color: '#e94560', bold: true  },
  { id:  2, cx: 279, cy: 204, text: '行賄 5,250 萬', color: '#e94560', bold: true  },
  { id:  3, cx: 137, cy: 192, text: '掌控',          color: '#6b7280'              },
  { id:  4, cx: 349, cy:  86, text: '違法容積申請',  color: '#9ca3af', size: 11    },
  { id:  5, cx: 348, cy: 292, text: '施壓',          color: '#a8b2d8'              },
  { id:  6, cx: 488, cy: 339, text: '施壓',          color: '#a8b2d8'              },
  { id:  7, cx: 693, cy: 186, text: '施壓',          color: '#a8b2d8'              },
  { id:  8, cx: 440, cy: 393, text: '指揮',          color: '#a8b2d8'              },
  { id:  9, cx: 134, cy: 404, text: '協助（無罪）',  color: '#9ca3af', size: 11    },
  { id: 10, cx: 844, cy: 232, text: '實質控制',      color: '#6b7280'              },
  { id: 11, cx: 896, cy: 129, text: '侵占',          color: '#e94560'              },
  { id: 12, cx: 708, cy: 291, text: '指示',          color: '#a8b2d8'              },
  { id: 13, cx: 970, cy: 230, text: '挪用公款',      color: '#e94560'              },
  { id: 14, cx: 698, cy: 370, text: '指示',          color: '#a8b2d8'              },
  { id: 15, cx: 958, cy: 431, text: '不實申報',      color: '#e94560'              },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  以下不需要修改
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function estimateWidth(text, size) {
  let w = 0;
  for (const ch of text) {
    w += ch.charCodeAt(0) > 127 ? size : Math.round(size * 0.6);
  }
  return w + 12;
}

function makeLabel({ cx, cy, text, color, size = 12, bold = false, w }) {
  const ns = 'http://www.w3.org/2000/svg';
  const width = w ?? estimateWidth(text, size);
  const height = 20;
  const rx = cy - 14;  // rect top = text baseline - 14

  const g = document.createElementNS(ns, 'g');

  const rect = document.createElementNS(ns, 'rect');
  rect.setAttribute('x', cx - width / 2);
  rect.setAttribute('y', rx);
  rect.setAttribute('width', width);
  rect.setAttribute('height', height);
  rect.setAttribute('rx', 4);
  rect.setAttribute('fill', 'white');

  const t = document.createElementNS(ns, 'text');
  t.setAttribute('x', cx);
  t.setAttribute('y', cy);
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('font-size', size);
  t.setAttribute('fill', color);
  if (bold) t.setAttribute('font-weight', '600');
  t.textContent = text;

  g.appendChild(rect);
  g.appendChild(t);
  return g;
}

const container = document.getElementById('labels');
LABELS.forEach(cfg => container.appendChild(makeLabel(cfg)));
</script>
